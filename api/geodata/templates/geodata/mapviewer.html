<!DOCTYPE html>
<html>
<head>
    <title>{{ layer_name }} — Map Viewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #header {
            background: #00827f;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #header h1 { font-size: 16px; font-weight: 500; }
        #header .meta { font-size: 13px; opacity: 0.85; }
        #header a { color: white; text-decoration: none; font-size: 13px; }
        #header a:hover { text-decoration: underline; }
        #map { height: calc(100vh - 48px); width: 100%; }
        .info-panel {
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 13px;
            max-width: 300px;
            max-height: 300px;
            overflow-y: auto;
        }
        .info-panel h4 { margin-bottom: 6px; color: #333; }
        .info-panel table { width: 100%; border-collapse: collapse; }
        .info-panel td { padding: 2px 4px; border-bottom: 1px solid #eee; }
        .info-panel td:first-child { font-weight: 600; color: #555; white-space: nowrap; }
        .loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000; background: white;
            padding: 20px 30px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="header">
        <div>
            <h1>{{ layer_name }}</h1>
            <span class="meta">{{ schema }}.{{ table }} &middot; {{ feature_count }} features &middot; {{ geom_type }}</span>
        </div>
        <a href="/cms_admin/geodata/ingestedlayer/">&larr; Back to Layers</a>
    </div>
    <div id="loading" class="loading">Loading GeoJSON...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([2, 38], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        var colors = [
            '#2196F3', '#4CAF50', '#FF9800', '#9C27B0', '#F44336',
            '#00BCD4', '#FFC107', '#795548', '#607D8B', '#E91E63', '#3F51B5'
        ];

        fetch('{{ geojson_url }}')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('loading').remove();

                var colorMap = {};
                var colorIdx = 0;

                var layer = L.geoJSON(data, {
                    style: function(feature) {
                        var key = feature.properties.iso3 || feature.properties.country || feature.properties.gid_0 || 'default';
                        if (!colorMap[key]) {
                            colorMap[key] = colors[colorIdx % colors.length];
                            colorIdx++;
                        }
                        return {
                            color: '#333',
                            weight: 1,
                            fillColor: colorMap[key],
                            fillOpacity: 0.4
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var rows = '';
                        for (var k in feature.properties) {
                            if (feature.properties[k] !== null) {
                                rows += '<tr><td>' + k + '</td><td>' + feature.properties[k] + '</td></tr>';
                            }
                        }
                        layer.bindPopup(
                            '<div class="info-panel"><h4>' +
                            (feature.properties.name_1 || feature.properties.name_2 || feature.properties.country || feature.properties.region || 'Feature') +
                            '</h4><table>' + rows + '</table></div>',
                            { maxWidth: 300 }
                        );
                    }
                }).addTo(map);

                map.fitBounds(layer.getBounds(), { padding: [20, 20] });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = 'Error loading data: ' + err;
            });
    </script>
</body>
</html>
